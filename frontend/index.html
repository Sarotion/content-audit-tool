<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Audit – Zjistěte, jak je na tom váš e-shop | GetFound</title>
    <meta name="description" content="Bezplatný audit obsahu vašeho e-shopu. Zjistěte slabiny v copy, SEO a struktuře stránek za méně než minutu." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- iframe height sync: posts current document height to parent window -->
    <script>
      (function () {
        // Only run when embedded in an iframe
        if (window.self === window.top) return;

        var lastHeight = 0;

        function sendHeight() {
          var h = document.documentElement.scrollHeight;
          if (h !== lastHeight) {
            lastHeight = h;
            window.parent.postMessage({ type: 'gf-audit-resize', height: h }, '*');
          }
        }

        // Send on load, on every DOM mutation, and on window resize
        sendHeight();
        window.addEventListener('resize', sendHeight);

        var observer = new MutationObserver(sendHeight);
        observer.observe(document.body, { subtree: true, childList: true, attributes: true, characterData: true });
      })();
    </script>
  </body>
</html>
