<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Audit – Zjistěte, jak je na tom váš e-shop | GetFound</title>
    <meta name="description" content="Bezplatný audit obsahu vašeho e-shopu. Zjistěte slabiny v copy, SEO a struktuře stránek za méně než minutu." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- iframe height sync: posts current document height to parent window -->
    <script>
      (function () {
        // Only run when embedded in an iframe
        if (window.self === window.top) return;

        var lastHeight = 0;
        var rafId = null;

        function measure() {
          // App root div (#root) is the source of truth.
          // Since we removed min-h-screen when embedded, this is purely
          // content-driven and has no circular dependency with iframe height.
          var root = document.getElementById('root');
          var h = root ? root.getBoundingClientRect().height : document.body.scrollHeight;
          // +2 px to absorb sub-pixel rounding across browsers
          return Math.ceil(h) + 2;
        }

        function sendHeight() {
          var h = measure();
          if (h !== lastHeight) {
            lastHeight = h;
            window.parent.postMessage({ type: 'gf-audit-resize', height: h }, '*');
          }
        }

        // Defer via double rAF so React has fully painted before we measure.
        function scheduleSend() {
          cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(function () {
            requestAnimationFrame(sendHeight);
          });
        }

        // Fire on every DOM change (React step changes, expanding sections…)
        var observer = new MutationObserver(scheduleSend);
        observer.observe(document.body, { subtree: true, childList: true, attributes: true });

        // Catch viewport resizes and initial load
        window.addEventListener('resize', scheduleSend);
        window.addEventListener('load', scheduleSend);
        scheduleSend();

        // Periodic fallback for async images / lazy-loaded content
        setInterval(sendHeight, 500);
      })();
    </script>
  </body>
</html>
