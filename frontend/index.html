<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Audit – Zjistěte, jak je na tom váš e-shop | GetFound</title>
    <meta name="description" content="Bezplatný audit obsahu vašeho e-shopu. Zjistěte slabiny v copy, SEO a struktuře stránek za méně než minutu." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- iframe height sync: posts current document height to parent window -->
    <script>
      (function () {
        // Only run when embedded in an iframe
        if (window.self === window.top) return;

        var lastHeight = 0;
        var rafId = null;

        function measure() {
          // Take the maximum across all height properties to handle
          // different browser quirks and CSS edge cases.
          // Add 24px buffer so rounding / sub-pixel gaps never trigger a scrollbar.
          return Math.max(
            document.body.scrollHeight,
            document.body.offsetHeight,
            document.documentElement.scrollHeight,
            document.documentElement.offsetHeight
          ) + 24;
        }

        function sendHeight() {
          var h = measure();
          if (h !== lastHeight) {
            lastHeight = h;
            window.parent.postMessage({ type: 'gf-audit-resize', height: h }, '*');
          }
        }

        // Defer via rAF so React has painted before we measure.
        // Double rAF catches a second layout pass (images, fonts, etc.).
        function scheduleSend() {
          cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(function () {
            sendHeight();
            requestAnimationFrame(sendHeight);
          });
        }

        // Fire on every DOM change (React step changes, expanding sections…)
        var observer = new MutationObserver(scheduleSend);
        observer.observe(document.body, { subtree: true, childList: true, attributes: true });

        // Also catch viewport resizes and the initial load
        window.addEventListener('resize', scheduleSend);
        window.addEventListener('load', scheduleSend);
        scheduleSend();

        // Periodic fallback: catches async images / lazy-loaded content
        setInterval(sendHeight, 400);
      })();
    </script>
  </body>
</html>
